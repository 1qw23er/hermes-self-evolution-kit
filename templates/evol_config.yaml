# ==========================================================================
# Hermes Self-Evolution Kit 配置模板
# 复制此文件到项目根目录并重命名为 config.yaml，然后填入你的配置
# ==========================================================================

project:
  name: "hermes-self-evolution"
  version: "0.1.0"
  description: "大模型自我进化工具包"

# ---------- 模型配置 ----------
model:
  provider: "openai"                    # 可选: openai | anthropic | vllm | local
  api_key: "${OPENAI_API_KEY}"          # 环境变量引用，或直接填入
  base_url: "https://api.openai.com/v1"
  model_name: "gpt-4o-mini"            # 进化用模型
  temperature: 0.7
  max_tokens: 4096

# ---------- 生成配置 ----------
generation:
  strategies:                           # 多样化生成策略
    - name: "temperature_sampling"
      enabled: true
      temperatures: [0.3, 0.5, 0.7, 0.9, 1.2]
    - name: "chain_of_thought"
      enabled: true
      prompt_template: "请逐步推理并给出答案：{prompt}"
    - name: "role_play"
      enabled: false
      roles: ["专家", "教育者", "实践者"]

  candidates_per_round: 5              # 每轮生成候选数

# ---------- 评分配置 ----------
scoring:
  judge_model: "gpt-4o"                # 评判模型（建议用更强的模型）
  weights:                             # 各维度权重
    correctness: 0.40                  # 正确性
    completeness: 0.25                 # 完整性
    readability: 0.20                  # 可读性
    safety: 0.15                       # 安全性

# ---------- 筛选配置 ----------
selection:
  method: "top_k_plus_noise"           # 筛选策略
  top_k: 3                             # 保留前 N 名
  noise_ratio: 0.1                     # 随机扰动比例（防过拟合）
  dedup_threshold: 0.85                # 语义去重阈值

# ---------- 进化配置 ----------
evolution:
  max_iterations: 20                   # 最大迭代轮数
  convergence_threshold: 0.5           # 连续 N 轮提升 < 此值则停止
  convergence_window: 5                # 检测收敛的窗口大小
  strategies:
    - "system_prompt_augmentation"     # 系统提示增强
    - "few_shot_expansion"             # Few-shot 示例扩充
    - "rule_extraction"                # 规则提取

# ---------- 记忆配置 ----------
memory:
  backend: "sqlite"                    # sqlite | postgresql
  sqlite_path: "data/evolution.db"
  retention_days: 90
  auto_rollback: true                  # 评分下降时自动回滚
  rollback_threshold: 3                # 连续下降 N 轮触发回滚

# ---------- 目录配置 ----------
paths:
  data_dir: "./data"
  log_dir: "./logs"
  report_dir: "./reports"
  feedback_dir: "./feedback"
